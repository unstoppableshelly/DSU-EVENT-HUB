<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSU Event Hub - Events</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .events-list {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .event-card {
            background: #fff;
            border: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .event-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(26, 58, 107, 0.15);
        }
        .event-card-top { padding: 1.5rem; color: #fff; position: relative; }
        .event-card[data-cat="Technical"] .event-card-top { background: linear-gradient(135deg, #1a3a6b, #2a5298); }
        .event-card[data-cat="Cultural"]  .event-card-top { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .event-card[data-cat="Sports"]    .event-card-top { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .event-card[data-cat="Workshop"]  .event-card-top { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .event-card-top .tag {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
            color: #fff; font-size: 11px; font-weight: 600;
            padding: 4px 12px; border-radius: 20px; display: inline-block;
            margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .event-card-top h3 { font-size: 18px; font-weight: 600; line-height: 1.3; }
        .event-card-body {
            padding: 1.5rem; display: flex; flex-direction: column; gap: 10px;
        }
        .event-info {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #555;
        }
        .event-desc {
            font-size: 14px; color: #444; line-height: 1.5;
            margin-top: 5px; margin-bottom: 15px;
        }
        .reg-btn {
            margin-top: auto; width: 100%; background: #f8f9fa; color: #1a3a6b;
            border: 1.5px solid #1a3a6b; padding: 10px; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease;
        }
        .reg-btn:hover { background: #1a3a6b; color: #FFD700; }
    </style>
</head>
<body>

<nav>
  <div class="logo">DSU <span>Event Hub</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html" class="active">Events</a>
    <a href="login.html">Student Login</a>
    <a href="signup.html">Sign Up</a>
    <a href="calendar.html">Calendar</a>
    <a href="contact.html">Contact Us</a>
    <a href="feedback.html">Feedback</a>
    <a href="register.html">Event Registration</a>
  </div>
</nav>

<section id="events">
  <div class="page-header">
      <h1>All Events</h1>
      <p>Browse and register for campus events</p>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterEvt(this,'All')">All</button>
    <button class="filter-btn" onclick="filterEvt(this,'Technical')">Technical</button>
    <button class="filter-btn" onclick="filterEvt(this,'Cultural')">Cultural</button>
    <button class="filter-btn" onclick="filterEvt(this,'Sports')">Sports</button>
    <button class="filter-btn" onclick="filterEvt(this,'Workshop')">Workshop</button>
  </div>
  <div class="events-list" id="events-list">
    <p style="grid-column:1/-1;text-align:center;color:#666;">Loading events...</p>
  </div>
</section>

<script src="scr.js"></script>
</body>
</html>
