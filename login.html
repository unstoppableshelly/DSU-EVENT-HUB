<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSU Event Hub - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="logo">DSU <span>Event Hub</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="login.html" class="active">Student Login</a>
    <a href="signup.html">Sign Up</a>
    <a href="calendar.html">Calendar</a>
    <a href="contact.html">Contact Us</a>
    <a href="feedback.html">Feedback</a>
    <a href="register.html">Event Registration</a>
  </div>
</nav>

<section id="login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="circle"><span>DSU</span></div>
        <p>Dayananda Sagar University</p>
      </div>
      <h2>Student Login</h2>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>USN / Register Number</label>
          <input class="usn" type="text" placeholder="e.g. 1DS23CS001">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input class="email" type="email" placeholder="name@dsu.edu.in">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="password" type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="submit-btn">Login to My Account</button>
      </form>
      <div class="login-footer">
        Don't have an account? <a href="signup.html">Sign up here</a>
        &nbsp;|&nbsp; <a onclick="alert('Reset link sent!')" style="cursor:pointer;">Forgot password?</a>
      </div>
    </div>
  </div>
</section>

<script src="scr.js"></script>
</body>
</html>
