<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSU Event Hub - Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="logo">DSU <span>Event Hub</span></div>
  <div class="nav-links">
    <span style="color:#cbd5e1;font-size:13px;">Admin Portal</span>
  </div>
</nav>

<section id="admin-login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="circle"><span>DSU</span></div>
        <p>Dayananda Sagar University</p>
      </div>
      <h2>Admin Login</h2>
      <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label>Admin ID</label>
          <input class="admin-id" type="text" placeholder="Enter Admin ID" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="password" type="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="submit-btn">Login to Dashboard</button>
      </form>
      <p style="text-align:center;margin-top:1rem;font-size:12px;color:#888;">
        Default: <code>admin</code> / <code>admin123</code> (after running seed)
      </p>
    </div>
  </div>
</section>

<script src="scr.js"></script>
</body>
</html>
